name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Root `npm run build` builds workspaces in explicit dependency order
      # (i18n → engine → contracts → web → server), matching the Dockerfile. This
      # avoids npm's alphabetical --workspaces order, which would build
      # @shadrin-v/contracts before @shadrin-v/engine it depends on, leaving contracts
      # without a usable .d.ts on a clean checkout (LKWkalk-dsu).
      - run: npm run build
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
